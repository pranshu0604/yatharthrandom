<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
    <defs>
        <style>
            .blob1 { animation: drift1 22s ease-in-out infinite alternate; }
            .blob2 { animation: drift2 25s ease-in-out infinite alternate; }
            .blob3 { animation: drift3 18s ease-in-out infinite alternate; }
            .blob4 { animation: drift4 28s ease-in-out infinite alternate; }
            .arc { transform-origin: 960px 540px; fill: none; stroke-linecap: round; }
            .arc1 { animation: spin 80s linear infinite; }
            .arc2 { animation: spinReverse 120s linear infinite; }
            .arc3 { animation: spin 160s linear infinite; }
            .net1 { animation: float1 20s ease-in-out infinite alternate; }
            .net2 { animation: float2 24s ease-in-out infinite alternate; }
            @keyframes drift1 {
                0% { transform: translate(-80px, -50px) scale(0.95); }
                100% { transform: translate(100px, 80px) scale(1.05); }
            }
            @keyframes drift2 {
                0% { transform: translate(60px, 100px) scale(1); }
                100% { transform: translate(-120px, -60px) scale(1.1); }
            }
            @keyframes drift3 {
                0% { transform: translate(-50px, 80px) scale(1.05); }
                100% { transform: translate(90px, -90px) scale(0.95); }
            }
            @keyframes drift4 {
                0% { transform: translate(100px, -100px) scale(1); }
                100% { transform: translate(-80px, 50px) scale(1.1); }
            }
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
            @keyframes spinReverse {
                0% { transform: rotate(360deg); }
                100% { transform: rotate(0deg); }
            }
            @keyframes float1 {
                0% { transform: translate(0px, 0px) rotate(0deg); }
                100% { transform: translate(30px, -20px) rotate(1deg); }
            }
            @keyframes float2 {
                0% { transform: translate(0px, 0px) rotate(0deg); }
                100% { transform: translate(-25px, 30px) rotate(-1deg); }
            }
            @keyframes pulse1 {
                0%, 100% { opacity: 0.12; }
                50% { opacity: 0.22; }
            }
            @keyframes pulse2 {
                0%, 100% { opacity: 0.08; }
                50% { opacity: 0.16; }
            }
        </style>
        <radialGradient id="gradIndigo" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#1B1F3B" stop-opacity="0.85"/>
            <stop offset="50%" stop-color="#1B1F3B" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#1B1F3B" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="gradGold" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.4"/>
            <stop offset="50%" stop-color="#D4AF37" stop-opacity="0.12"/>
            <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="gradTeal" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#2EC4B6" stop-opacity="0.3"/>
            <stop offset="50%" stop-color="#2EC4B6" stop-opacity="0.1"/>
            <stop offset="100%" stop-color="#2EC4B6" stop-opacity="0"/>
        </radialGradient>
        <pattern id="dotGrid" width="36" height="36" patternUnits="userSpaceOnUse">
            <circle cx="18" cy="18" r="1" fill="#FFFFFF" opacity="0.15"/>
        </pattern>
        <g id="node">
            <circle cx="0" cy="0" r="3.5" fill="#FFFFFF" opacity="0.35"/>
            <circle cx="0" cy="0" r="14" fill="none" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1"/>
        </g>
    </defs>

    <rect width="100%" height="100%" fill="#000000"/>

    <!-- Gradient blobs -->
    <circle class="blob1" cx="250" cy="180" r="700" fill="url(#gradIndigo)"/>
    <circle class="blob2" cx="1650" cy="850" r="600" fill="url(#gradGold)"/>
    <circle class="blob3" cx="1050" cy="350" r="550" fill="url(#gradTeal)"/>
    <circle class="blob4" cx="1500" cy="150" r="800" fill="url(#gradIndigo)"/>

    <!-- Dot grid overlay -->
    <rect width="100%" height="100%" fill="url(#dotGrid)"/>

    <!-- Constellation network left -->
    <g class="net1">
        <path d="M 200 300 L 380 450 L 290 590 L 520 500 L 580 340 L 450 250 Z" fill="none" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="1"/>
        <path d="M 380 450 L 520 500" fill="none" stroke="#D4AF37" stroke-opacity="0.18" stroke-width="1"/>
        <path d="M 290 590 L 450 250" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1"/>
        <use href="#node" x="200" y="300"/>
        <use href="#node" x="380" y="450"/>
        <use href="#node" x="290" y="590"/>
        <use href="#node" x="520" y="500"/>
        <use href="#node" x="580" y="340"/>
        <use href="#node" x="450" y="250"/>
    </g>

    <!-- Constellation network right -->
    <g class="net2">
        <path d="M 1500 780 L 1720 720 L 1630 560 L 1420 620 L 1360 830 L 1500 780" fill="none" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="1"/>
        <path d="M 1630 560 L 1500 780" fill="none" stroke="#2EC4B6" stroke-opacity="0.18" stroke-width="1"/>
        <path d="M 1720 720 L 1360 830" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1"/>
        <use href="#node" x="1500" y="780"/>
        <use href="#node" x="1720" y="720"/>
        <use href="#node" x="1630" y="560"/>
        <use href="#node" x="1420" y="620"/>
        <use href="#node" x="1360" y="830"/>
    </g>

    <!-- Rotating arcs -->
    <circle class="arc arc1" cx="960" cy="540" r="420" stroke="#FFFFFF" stroke-opacity="0.28" stroke-width="1.5" stroke-dasharray="150 500 100 800"/>
    <circle class="arc arc2" cx="960" cy="540" r="580" stroke="#D4AF37" stroke-opacity="0.25" stroke-width="2" stroke-dasharray="300 700 80 1000"/>
    <circle class="arc arc3" cx="960" cy="540" r="750" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="1.5" stroke-dasharray="500 1200 200 800"/>
</svg>
